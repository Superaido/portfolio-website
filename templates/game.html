<!DOCTYPE html>
<html lang="en-us">
<head>
    <style>
        body {
            background-image: url("static/background.png");
            background-repeat: repeat;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
    </style>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <title>Platformer | Portfolio</title>

    <link rel="shortcut icon" href="{{ url_for('static', filename='unity/TemplateData/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='unity/TemplateData/style.css') }}">
</head>

<body>
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width="960" height="600" tabindex="-1"></canvas>

        <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
        </div>
        </div>

        <div id="unity-warning"></div>

        <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">Platformer</div>
        </div>
    </div>

    <script>
        const canvas = document.querySelector("#unity-canvas");

        function unityShowBanner(msg, type) {
        const warningBanner = document.querySelector("#unity-warning");

        function updateBannerVisibility() {
            warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }

        const div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);

        if (type === 'error') {
            div.style = 'background: red; padding: 10px;';
        } else {
            if (type === 'warning') {
            div.style = 'background: yellow; padding: 10px;';
            }
            setTimeout(() => {
            warningBanner.removeChild(div);
            updateBannerVisibility();
            }, 5000);
        }

        updateBannerVisibility();
        }

        const buildUrl = "{{ url_for('static', filename='unity/Build') }}";

        const loaderUrl = buildUrl + "/PlatformerBuild.loader.js";

        const config = {
        dataUrl: buildUrl + "/PlatformerBuild.data",
        frameworkUrl: buildUrl + "/PlatformerBuild.framework.js",
        codeUrl: buildUrl + "/PlatformerBuild.wasm",
        streamingAssetsUrl: "{{ url_for('static', filename='unity/StreamingAssets') }}",
        companyName: "DefaultCompany",
        productName: "Platformer",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        const meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no';
        document.head.appendChild(meta);

        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
        } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
        }

        document.querySelector("#unity-loading-bar").style.display = "block";

        const script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
            document.querySelector("#unity-progress-bar-full").style.width = (progress * 100) + "%";
        }).then((unityInstance) => {
            document.querySelector("#unity-loading-bar").style.display = "none";

            document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
            };

        }).catch((message) => {
            alert(message);
        });
        };

        document.body.appendChild(script);
    </script>
</body>
</html>
